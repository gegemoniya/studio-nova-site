<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Studio Nova</title>
<style>
  :root {
    --fg: #f4f1ff;
    --accent-a: #ff5fa2;
    --accent-b: #6ee7ff;
    --accent-c: #ffd166;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #050015;
    color: var(--fg);
    font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  #scene {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
    z-index: 0;
  }

  .vignette {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    background:
      radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.55) 100%),
      radial-gradient(ellipse at top,    rgba(255, 95, 162, 0.10), transparent 60%),
      radial-gradient(ellipse at bottom, rgba(110, 231, 255, 0.10), transparent 60%);
  }

  .overlay {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    z-index: 2;
    text-align: center;
    padding: 0 24px;
  }

  .badge {
    display: inline-block;
    padding: 6px 14px;
    border: 1px solid rgba(255,255,255,0.18);
    background: rgba(255,255,255,0.04);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-radius: 999px;
    font-size: 12px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.78);
    margin-bottom: 28px;
    animation: float-in 1.2s ease-out 0.1s both;
  }

  h1 {
    font-size: clamp(48px, 11vw, 168px);
    font-weight: 900;
    letter-spacing: -0.04em;
    line-height: 0.92;
    background: linear-gradient(135deg,
      var(--accent-a) 0%,
      var(--accent-c) 45%,
      var(--accent-b) 100%);
    background-size: 200% 200%;
    -webkit-background-clip: text;
            background-clip: text;
    -webkit-text-fill-color: transparent;
    animation:
      float-in 1.4s cubic-bezier(0.2, 0.8, 0.2, 1) 0.25s both,
      shimmer 8s ease-in-out infinite;
    text-shadow: 0 0 60px rgba(255, 95, 162, 0.18);
  }

  .tagline {
    margin-top: 22px;
    font-size: clamp(14px, 1.4vw, 18px);
    font-weight: 400;
    letter-spacing: 0.04em;
    color: rgba(244, 241, 255, 0.72);
    max-width: 540px;
    animation: float-in 1.4s ease-out 0.45s both;
  }

  .footer {
    position: fixed;
    bottom: 28px;
    left: 0;
    right: 0;
    display: flex;
    justify-content: center;
    gap: 24px;
    z-index: 2;
    pointer-events: auto;
    font-size: 12px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(244, 241, 255, 0.45);
    animation: float-in 1.4s ease-out 0.7s both;
  }

  .footer span::before {
    content: '';
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent-b);
    margin-right: 8px;
    transform: translateY(-2px);
    box-shadow: 0 0 12px var(--accent-b);
    animation: pulse 2.4s ease-in-out infinite;
  }

  @keyframes float-in {
    from { opacity: 0; transform: translateY(20px); filter: blur(8px); }
    to   { opacity: 1; transform: translateY(0);    filter: blur(0); }
  }

  @keyframes shimmer {
    0%, 100% { background-position: 0% 50%; }
    50%      { background-position: 100% 50%; }
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.5; transform: translateY(-2px) scale(1); }
    50%      { opacity: 1;   transform: translateY(-2px) scale(1.4); }
  }

  .grain {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 3;
    opacity: 0.06;
    mix-blend-mode: overlay;
    background-image: url("data:image/svg+xml;utf8,<svg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%' height='100%' filter='url(%23n)' opacity='0.55'/></svg>");
  }
</style>
</head>
<body>
  <canvas id="scene"></canvas>
  <div class="vignette"></div>
  <div class="grain"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
  }
}
</script>
<script type="module">
import * as THREE from 'three';

const canvas   = document.getElementById('scene');
const renderer = new THREE.WebGLRenderer({
  canvas,
  antialias: true,
  alpha: true,
  powerPreference: 'high-performance'
});
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;
renderer.outputColorSpace = THREE.SRGBColorSpace;

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
  45,
  window.innerWidth / window.innerHeight,
  0.1,
  100
);
camera.position.set(0, 0, 5.6);

// ───────────── BACKGROUND SKY (inside-out gradient sphere) ─────────────
const skyGeo = new THREE.SphereGeometry(40, 64, 64);
const skyMat = new THREE.ShaderMaterial({
  side: THREE.BackSide,
  uniforms: {
    uTime:  { value: 0 },
    uColorA:{ value: new THREE.Color('#1a0033') }, // deep violet
    uColorB:{ value: new THREE.Color('#330055') },
    uColorC:{ value: new THREE.Color('#001a44') }, // deep blue
    uColorD:{ value: new THREE.Color('#050015') }, // near-black
  },
  vertexShader: /* glsl */ `
    varying vec3 vPos;
    void main() {
      vPos = position;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: /* glsl */ `
    varying vec3 vPos;
    uniform float uTime;
    uniform vec3 uColorA;
    uniform vec3 uColorB;
    uniform vec3 uColorC;
    uniform vec3 uColorD;

    // hash noise
    float hash(vec3 p) {
      p = fract(p * 0.3183099 + 0.1);
      p *= 17.0;
      return fract(p.x * p.y * p.z * (p.x + p.y + p.z));
    }
    float noise(vec3 x) {
      vec3 i = floor(x); vec3 f = fract(x);
      f = f * f * (3.0 - 2.0 * f);
      return mix(
        mix(mix(hash(i + vec3(0,0,0)), hash(i + vec3(1,0,0)), f.x),
            mix(hash(i + vec3(0,1,0)), hash(i + vec3(1,1,0)), f.x), f.y),
        mix(mix(hash(i + vec3(0,0,1)), hash(i + vec3(1,0,1)), f.x),
            mix(hash(i + vec3(0,1,1)), hash(i + vec3(1,1,1)), f.x), f.y),
        f.z);
    }

    void main() {
      vec3 dir = normalize(vPos);
      float t = uTime * 0.04;

      // soft cloudy nebula
      float n = 0.0;
      n += noise(dir * 1.5 + vec3(0.0, t, 0.0)) * 0.5;
      n += noise(dir * 3.0 - vec3(t, 0.0, t)) * 0.25;
      n += noise(dir * 6.0 + vec3(0.0, 0.0, t)) * 0.125;

      // vertical gradient base
      float v = dir.y * 0.5 + 0.5;
      vec3 base = mix(uColorD, uColorC, smoothstep(0.0, 0.55, v));
      base      = mix(base,    uColorA, smoothstep(0.45, 1.0, v));

      // nebula color washes
      vec3 nebula = mix(uColorB, vec3(1.0, 0.4, 0.7), n);
      base = mix(base, nebula, n * 0.45);

      // horizon glow
      float horizon = exp(-abs(dir.y) * 5.5);
      base += horizon * vec3(0.65, 0.20, 0.55) * 0.25;

      gl_FragColor = vec4(base, 1.0);
    }
  `
});
scene.add(new THREE.Mesh(skyGeo, skyMat));

// ───────────── HERO OBJECT ─────────────
const heroGeo = new THREE.IcosahedronGeometry(1.15, 1);

// custom iridescent shader
const heroMat = new THREE.ShaderMaterial({
  uniforms: {
    uTime:    { value: 0 },
    uColorA:  { value: new THREE.Color('#ff5fa2') },
    uColorB:  { value: new THREE.Color('#6ee7ff') },
    uColorC:  { value: new THREE.Color('#ffd166') },
  },
  vertexShader: /* glsl */ `
    varying vec3 vNormal;
    varying vec3 vPos;
    uniform float uTime;

    // pseudo-noise displacement
    float hash(vec3 p) {
      return fract(sin(dot(p, vec3(127.1, 311.7, 74.7))) * 43758.5453);
    }
    float noise(vec3 x) {
      vec3 i = floor(x); vec3 f = fract(x);
      f = f * f * (3.0 - 2.0 * f);
      return mix(
        mix(mix(hash(i+vec3(0,0,0)), hash(i+vec3(1,0,0)), f.x),
            mix(hash(i+vec3(0,1,0)), hash(i+vec3(1,1,0)), f.x), f.y),
        mix(mix(hash(i+vec3(0,0,1)), hash(i+vec3(1,0,1)), f.x),
            mix(hash(i+vec3(0,1,1)), hash(i+vec3(1,1,1)), f.x), f.y),
        f.z);
    }

    void main() {
      vec3 p = position;
      float n = noise(p * 1.6 + uTime * 0.35);
      p += normal * (n - 0.5) * 0.16;
      vNormal = normalize(normalMatrix * normal);
      vPos = (modelViewMatrix * vec4(p, 1.0)).xyz;
      gl_Position = projectionMatrix * vec4(vPos, 1.0);
    }
  `,
  fragmentShader: /* glsl */ `
    varying vec3 vNormal;
    varying vec3 vPos;
    uniform vec3 uColorA;
    uniform vec3 uColorB;
    uniform vec3 uColorC;
    uniform float uTime;

    void main() {
      vec3 N = normalize(vNormal);
      vec3 V = normalize(-vPos);

      float fres = pow(1.0 - max(dot(N, V), 0.0), 2.2);

      // iridescent gradient by normal Y + animated phase
      float phase = N.y * 0.5 + 0.5 + sin(uTime * 0.6 + N.x * 2.0) * 0.15;
      vec3 ir = mix(uColorA, uColorB, smoothstep(0.0, 0.55, phase));
      ir      = mix(ir,      uColorC, smoothstep(0.55, 1.0, phase));

      // diffuse-ish term against three colored fake-lights
      float l1 = max(dot(N, normalize(vec3( 0.6,  0.7, 0.4))), 0.0);
      float l2 = max(dot(N, normalize(vec3(-0.5,  0.3, 0.7))), 0.0);
      float l3 = max(dot(N, normalize(vec3( 0.0, -0.8, 0.4))), 0.0);
      vec3 lit = ir * (0.25 + l1 * 0.55 + l2 * 0.35 + l3 * 0.20);

      // rim glow
      lit += fres * (uColorA * 0.6 + uColorB * 0.4) * 1.4;

      // subtle internal sparkle
      lit += pow(max(dot(N, normalize(vec3(0.2, 1.0, 0.6))), 0.0), 18.0) * vec3(1.0, 0.95, 1.0) * 0.8;

      gl_FragColor = vec4(lit, 1.0);
    }
  `,
});

const hero = new THREE.Mesh(heroGeo, heroMat);
scene.add(hero);

// ───────────── WIREFRAME HALO ─────────────
const haloGeo  = new THREE.IcosahedronGeometry(1.55, 1);
const haloMat  = new THREE.MeshBasicMaterial({
  color: 0xffffff,
  wireframe: true,
  transparent: true,
  opacity: 0.07,
});
const halo = new THREE.Mesh(haloGeo, haloMat);
scene.add(halo);

// ───────────── PARTICLES ─────────────
const PARTICLE_COUNT = 1800;
const particlePositions = new Float32Array(PARTICLE_COUNT * 3);
const particleColors    = new Float32Array(PARTICLE_COUNT * 3);
const particleSizes     = new Float32Array(PARTICLE_COUNT);

const palette = [
  new THREE.Color('#ff5fa2'),
  new THREE.Color('#6ee7ff'),
  new THREE.Color('#ffd166'),
  new THREE.Color('#a78bfa'),
  new THREE.Color('#ffffff'),
];

for (let i = 0; i < PARTICLE_COUNT; i++) {
  // random distribution in spherical shell
  const r = 2.6 + Math.random() * 9;
  const theta = Math.random() * Math.PI * 2;
  const phi   = Math.acos(2 * Math.random() - 1);
  particlePositions[i * 3 + 0] = r * Math.sin(phi) * Math.cos(theta);
  particlePositions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
  particlePositions[i * 3 + 2] = r * Math.cos(phi);

  const c = palette[(Math.random() * palette.length) | 0];
  particleColors[i * 3 + 0] = c.r;
  particleColors[i * 3 + 1] = c.g;
  particleColors[i * 3 + 2] = c.b;

  particleSizes[i] = 0.5 + Math.random() * 2.4;
}

const particleGeo = new THREE.BufferGeometry();
particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
particleGeo.setAttribute('color',    new THREE.BufferAttribute(particleColors, 3));
particleGeo.setAttribute('aSize',    new THREE.BufferAttribute(particleSizes, 1));

const particleMat = new THREE.ShaderMaterial({
  transparent: true,
  depthWrite:  false,
  blending: THREE.AdditiveBlending,
  uniforms: {
    uTime: { value: 0 },
    uPxRatio: { value: renderer.getPixelRatio() },
  },
  vertexShader: /* glsl */ `
    attribute float aSize;
    varying vec3 vColor;
    uniform float uTime;
    uniform float uPxRatio;
    void main() {
      vColor = color;
      vec3 p = position;
      // slow swirl
      float ang = uTime * 0.06 + length(p) * 0.05;
      mat2 R = mat2(cos(ang), -sin(ang), sin(ang), cos(ang));
      p.xz = R * p.xz;
      vec4 mv = modelViewMatrix * vec4(p, 1.0);
      gl_Position = projectionMatrix * mv;
      gl_PointSize = aSize * uPxRatio * (180.0 / -mv.z);
    }
  `,
  fragmentShader: /* glsl */ `
    varying vec3 vColor;
    void main() {
      vec2 uv = gl_PointCoord - 0.5;
      float d = length(uv);
      float a = smoothstep(0.5, 0.0, d);
      a *= a;
      gl_FragColor = vec4(vColor * (1.0 + a * 1.6), a);
    }
  `,
  vertexColors: true,
});

const particles = new THREE.Points(particleGeo, particleMat);
scene.add(particles);

// ───────────── INTERACTION ─────────────
const mouse  = new THREE.Vector2(0, 0);
const target = new THREE.Vector2(0, 0);
window.addEventListener('pointermove', (e) => {
  target.x = (e.clientX / window.innerWidth)  * 2 - 1;
  target.y = (e.clientY / window.innerHeight) * 2 - 1;
});

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  particleMat.uniforms.uPxRatio.value = renderer.getPixelRatio();
});

// ───────────── ANIMATION LOOP ─────────────
const clock = new THREE.Clock();
function loop() {
  const t  = clock.getElapsedTime();
  const dt = Math.min(clock.getDelta(), 0.05);

  // smooth mouse follow
  mouse.x += (target.x - mouse.x) * 0.04;
  mouse.y += (target.y - mouse.y) * 0.04;

  // hero rotation
  hero.rotation.y += dt * 0.25 + mouse.x * 0.01;
  hero.rotation.x += dt * 0.18 - mouse.y * 0.01;

  halo.rotation.y -= dt * 0.10;
  halo.rotation.x += dt * 0.06;

  // gentle camera parallax
  camera.position.x += (mouse.x * 0.7 - camera.position.x) * 0.04;
  camera.position.y += (-mouse.y * 0.45 - camera.position.y) * 0.04;
  camera.lookAt(0, 0, 0);

  // shader time
  heroMat.uniforms.uTime.value     = t;
  particleMat.uniforms.uTime.value = t;
  skyMat.uniforms.uTime.value      = t;

  renderer.render(scene, camera);
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
